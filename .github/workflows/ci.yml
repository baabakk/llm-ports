name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 reached EOL April 2025. Node 24 added ahead of the GitHub
        # Actions Node 20 deprecation deadline (June 2026 forced Node 24).
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify SDK isolation
        run: |
          # The whole point of this library: only adapter-* packages may import
          # from "ai" or "@ai-sdk/*" or "@anthropic-ai/sdk" or "openai" or "ollama".
          # Fail CI if any other package leaks an SDK import.
          set -e
          LEAKS=$(grep -rE "from \"(ai|@ai-sdk/|@anthropic-ai/sdk|^openai$|^ollama$)" \
            packages/core/src \
            packages/capabilities/src \
            packages/observability/src \
            2>/dev/null || true)
          if [ -n "$LEAKS" ]; then
            echo "SDK import leak detected outside adapter packages:"
            echo "$LEAKS"
            exit 1
          fi
          echo "SDK isolation verified."
